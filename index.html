<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
  <title>태주전자 수리 일지</title>
  
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-storage-compat.js"></script>
  
  <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
  
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="toast" class="toast"></div>
  <div class="ld" id="ld"><div class="spin"></div><span class="ld-msg" id="ldMsg">로딩 중...</span></div>

  <div class="sb-overlay" id="sbOverlay" onclick="closeSidebar()"></div>
  <div class="sidebar" id="sidebar">
    <div class="sb-head">
      <img src="logo.jpg" alt="태주전자"> <button class="sb-close" onclick="closeSidebar()"><i class="ti ti-x"></i></button>
    </div>
    <div style="font-size: 10px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--hint); padding: 16px 16px 8px; border-top: 1px solid var(--border); margin-top: 5px;">Board</div>
    <div class="sb-item" id="sideTabRecords" onclick="setBoard('records')" style="margin: 0 10px 4px; padding: 12px 10px;">
      <div class="sb-ico"><i class="ti ti-tool"></i></div>
      <div class="sb-name" style="font-weight: 700;">수리 일지</div>
    </div>
    <div class="sb-item" id="sideTabGuides" onclick="setBoard('guides')" style="margin: 0 10px 4px; padding: 12px 10px;">
      <div class="sb-ico"><i class="ti ti-notebook"></i></div>
      <div class="sb-name" style="font-weight: 700;">가이드</div>
    </div>
    <div class="sb-sort">
      <div class="sb-sort-label">정렬</div>
      <div class="sb-sort-btns">
        <button class="sb-sort-btn on" onclick="setSbSort('alpha')" id="sbs-alpha">가나다순</button>
        <button class="sb-sort-btn" onclick="setSbSort('ralpha')" id="sbs-ralpha">역순</button>
        <button class="sb-sort-btn" onclick="setSbSort('count')" id="sbs-count">건수순</button>
        <button class="sb-sort-btn" onclick="setSbSort('recent')" id="sbs-recent">최신순</button>
      </div>
    </div>
    <div class="sb-list" id="sbList"></div>
    <div class="sb-footer">
      <button class="sb-add-btn" onclick="closeSidebar();openAdd()"><i class="ti ti-plus"></i> 새 글 작성</button>
      <div class="sb-user-info" id="sbUserInfo" onclick="closeSidebar();openSettings()">
        <div class="sb-user-avatar" id="sbUserAvatar">?</div>
        <span class="sb-user-name" id="sbUserName">로딩 중...</span>
      </div>
    </div>
  </div>

  <div id="authScr" class="auth-scr" style="display:none">
    <div class="auth-card" id="authCard"></div>
  </div>

  <div id="appScr" style="display:none;flex-direction:column;flex:1" class="wrap">
    <div class="hdr">
  <button class="hbtn" onclick="openSidebar()" title="모델 목록"><i class="ti ti-menu-2"></i></button>
  <button class="hbtn back-btn" id="backBtn" onclick="goHome()"><i class="ti ti-arrow-left"></i></button>
  <img src="logo.jpg" alt="태주전자" class="hdr-logo"> <span class="hdr-title" id="hdrTitle">수리 일지</span>
      <div class="search-wrap">
  <i class="ti ti-search"></i>
  <input class="search-input" type="search" id="searchInput" placeholder="태그·모델명 검색" oninput="onSearch()" autocomplete="off">
</div>
      <button class="btn-add" onclick="openAdd()" style="display:none"><i class="ti ti-plus"></i> 추가</button>
      <div class="user-chip" id="userChip" onclick="openSettings()" style="display:none"></div>
    </div>
    <div class="main" id="main"></div>
  </div>

  <button class="fab" id="fab" onclick="openAdd()" title="새 글 작성" style="display:none"><i class="ti ti-plus"></i></button>

  <div class="overlay" id="overlay" onclick="bgClick(event)">
    <div class="sheet" id="sheet"></div>
  </div>

  <div id="drawOverlay" class="overlay" style="z-index:500;">
    <div style="background:#1E293B;width:100%;height:100%;display:flex;flex-direction:column;">
      <div style="display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid #334155;">
        <span style="color:#fff;font-weight:700;font-size:15px;">마크업 사진</span>
        <div style="display:flex;gap:8px;">
          <button onclick="resetDraw()" style="background:#334155;color:#94A3B8;border:none;padding:7px 14px;border-radius:8px;font-family:var(--font);font-size:13px;font-weight:600;cursor:pointer;">초기화</button>
          <button onclick="applyDraw()" style="background:#6366F1;color:#fff;border:none;padding:7px 14px;border-radius:8px;font-family:var(--font);font-size:13px;font-weight:600;cursor:pointer;">완료</button>
          <button onclick="if(location.hash === '#draw') history.back(); document.getElementById('drawOverlay').classList.remove('on')" style="...">✕</button>
        </div>
      </div>
      <div id="drawCanvasWrap" style="flex:1;position:relative;overflow:hidden;">
        <canvas id="drawCanvas" style="position:absolute;touch-action:none;"></canvas>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
