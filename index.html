<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>태주전자 수리 일지 & 가이드</title>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-storage-compat.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
/* 기본 변수 및 리셋 (기존 유지) */
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F1F5F9;--white:#FFFFFF;
  --border:#E2E8F0;--border2:#CBD5E1;
  --text:#0F172A;--sub:#475569;--hint:#94A3B8;
  --accent:#6366F1;--ah:#4F46E5;--al:#EEF2FF;
  --danger:#EF4444;--dl:#FEF2F2;--ok:#10B981;
  --sh:0 1px 3px rgba(0,0,0,.07),0 1px 2px rgba(0,0,0,.04);
  --shl:0 10px 25px rgba(0,0,0,.1),0 4px 8px rgba(0,0,0,.06);
  --font:'Pretendard',-apple-system,sans-serif
}
body{background:var(--bg);font-family:var(--font);color:var(--text);min-height:100vh}

/* 로딩 & 토스트 */
.ld{position:fixed;inset:0;background:rgba(255,255,255,.92);display:none;align-items:center;justify-content:center;z-index:9999;flex-direction:column;gap:14px;backdrop-filter:blur(4px)}
.ld.on{display:flex}
.spin{width:36px;height:36px;border:3px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(20px);background:#1E293B;color:#fff;padding:10px 20px;border-radius:100px;font-size:13px;font-weight:500;opacity:0;transition:all .25s;z-index:10000;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* 헤더 및 게시판 탭 */
.hdr{background:var(--white);border-bottom:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:10;box-shadow:var(--sh)}
.hdr-logo{font-size:18px;font-weight:800;color:var(--accent);letter-spacing:-0.5px;cursor:pointer; display:flex; align-items:center; gap:6px;}
.board-tabs{display:flex;gap:4px;background:var(--bg);border-radius:10px;padding:4px;margin-left:auto;}
.board-tab{background:transparent;border:none;font-family:var(--font);font-size:13px;font-weight:700;color:var(--hint);padding:6px 12px;border-radius:8px;cursor:pointer;transition:all .15s;}
.board-tab.active{background:var(--white);color:var(--accent);box-shadow:var(--sh);}

/* 메인 리스트 */
.main{padding:18px;max-width:800px;margin:0 auto;width:100%}
.rlist{display:flex;flex-direction:column;gap:12px}
.rcard{background:var(--white);border:1px solid var(--border);border-radius:16px;cursor:pointer;transition:all .18s;overflow:hidden;box-shadow:var(--sh);display:flex;flex-direction:column;}
.rcard:hover{border-color:var(--accent);transform:translateY(-2px)}
.rc-img{width:100%;height:180px;object-fit:cover;display:block;background:var(--bg);}
.rc-body{padding:16px}
.rc-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;}
.rc-model{font-size:16px;font-weight:800;color:var(--text);}
.rc-symptom{font-size:13px;color:var(--sub);line-height:1.5;margin-bottom:10px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.rc-foot{display:flex;justify-content:space-between;align-items:center;font-size:11px;color:var(--hint);font-weight:500;}
.empty-state{text-align:center;padding:60px 20px;color:var(--hint);}
.empty-state i{font-size:48px;opacity:0.3;margin-bottom:16px;display:block;}

/* 플로팅 버튼 */
.fab{position:fixed;bottom:24px;right:24px;width:56px;height:56px;background:var(--accent);color:#fff;border:none;border-radius:50%;font-size:24px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(99,102,241,.4);z-index:50;transition:all .2s;}
.fab:hover{transform:scale(1.08);background:var(--ah);}

/* 모달 및 시트 */
.overlay{position:fixed;inset:0;background:rgba(15,23,42,.5);z-index:100;display:none;flex-direction:column;justify-content:flex-end;backdrop-filter:blur(3px)}
.overlay.on{display:flex}
.sheet{background:var(--white);border-radius:24px 24px 0 0;width:100%;max-height:92vh;overflow-y:auto;padding:24px;box-shadow:0 -8px 30px rgba(0,0,0,.12);display:flex;flex-direction:column;}
.sh-handle{width:40px;height:4px;background:var(--border2);border-radius:2px;margin:0 auto 20px}
.sh-title{font-size:18px;font-weight:800;margin-bottom:20px;display:flex;justify-content:space-between;align-items:center;}
.btn-x{background:var(--bg);border:none;width:32px;height:32px;border-radius:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--sub);font-size:18px;}

/* 입력 폼 */
.fl{margin-bottom:16px}
.fl label{font-size:11px;font-weight:700;color:var(--hint);display:block;margin-bottom:6px}
input[type=text],textarea{width:100%;background:var(--bg);border:1.5px solid var(--border);color:var(--text);padding:12px 14px;border-radius:12px;font-family:var(--font);font-size:14px;outline:none;transition:all .2s;}
input[type=text]:focus,textarea:focus{border-color:var(--accent);background:#fff;}
textarea{min-height:80px;resize:vertical;}
.btn-save{width:100%;background:var(--accent);color:#fff;border:none;padding:14px;border-radius:12px;font-family:var(--font);font-size:15px;font-weight:700;cursor:pointer;margin-top:10px;}

/* 사진 블록 및 그리기 모달 */
.blk-list{display:flex;flex-direction:column;gap:12px;margin-bottom:16px;}
.blk-item{position:relative;border:1px solid var(--border);border-radius:12px;overflow:hidden;background:var(--bg);}
.blk-item img{width:100%;display:block;object-fit:cover;max-height:200px;}
.blk-del{position:absolute;top:8px;right:8px;background:rgba(255,255,255,0.9);border:none;width:28px;height:28px;border-radius:8px;color:var(--danger);cursor:pointer;}
.btn-add-img{background:var(--al);color:var(--accent);border:1.5px dashed var(--am);padding:14px;border-radius:12px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;}

#drawCanvasWrap{flex:1;background:#000;border-radius:12px;position:relative;overflow:hidden;margin-bottom:16px;}
#drawCanvas{position:absolute;}
.draw-btns{display:flex;gap:10px;}
.btn-reset{flex:1;background:var(--bg);color:var(--sub);border:none;padding:14px;border-radius:12px;font-weight:700;cursor:pointer;}

/* 인증 화면 (심플 버전) */
#authScr{position:fixed;inset:0;background:var(--bg);z-index:99999;display:flex;align-items:center;justify-content:center;padding:24px;}
.auth-card{background:#fff;padding:32px;border-radius:24px;width:100%;max-width:360px;box-shadow:var(--shl);}
</style>
</head>
<body>

<div id="ld" class="ld"><div class="spin"></div></div>
<div id="toast" class="toast"></div>

<div class="hdr">
  <div class="hdr-logo"><i class="ti ti-tool"></i> 태주전자 KMS</div>
  <div class="board-tabs">
    <button class="board-tab active" id="tabRecords" onclick="setBoard('records')">수리 일지</button>
    <button class="board-tab" id="tabGuides" onclick="setBoard('guides')">가이드</button>
  </div>
</div>

<div class="main">
  <div class="rlist" id="rlist"></div>
</div>

<button class="fab" onclick="openEditor()"><i class="ti ti-pencil"></i></button>

<div class="overlay" id="editorOverlay">
  <div class="sheet">
    <div class="sh-handle"></div>
    <div class="sh-title"><span id="editorTitle">새 글 작성</span> <button class="btn-x" onclick="closeEditor()"><i class="ti ti-x"></i></button></div>
    
    <div class="fl">
      <label>모델명 / 기기명</label>
      <input type="text" id="f_model" placeholder="예: 삼성 TV 65인치 (UN65...)">
    </div>
    
    <div class="fl">
      <label>증상 (Symptom)</label>
      <textarea id="f_symptom" placeholder="입고 시 증상을 상세히 적어주세요."></textarea>
    </div>
    <div class="fl">
      <label>원인 및 조치 내용 (Action)</label>
      <textarea id="f_action" placeholder="발생 원인과 수리 포인트, 주의사항을 적어주세요."></textarea>
    </div>

    <div class="fl">
      <label>첨부 사진 (그리기 가능)</label>
      <div class="blk-list" id="blockList"></div>
      <button class="btn-add-img" onclick="document.getElementById('fileInput').click()">
        <i class="ti ti-photo-plus"></i> 사진 추가 및 포인트 표시
      </button>
      <input type="file" id="fileInput" accept="image/*" style="display:none" onchange="handleFileSelect(event)">
    </div>

    <button class="btn-save" onclick="savePost()">저장하기</button>
  </div>
</div>

<div class="overlay" id="drawOverlay" style="z-index:200;">
  <div class="sheet" style="height:95vh;">
    <div class="sh-title">사진 마크업 <button class="btn-x" onclick="document.getElementById('drawOverlay').classList.remove('on')"><i class="ti ti-x"></i></button></div>
    <div id="drawCanvasWrap">
      <canvas id="drawCanvas"></canvas>
    </div>
    <div class="draw-btns">
      <button class="btn-reset" onclick="resetDraw()">지우기</button>
      <button class="btn-save" style="margin-top:0; flex:2;" onclick="applyDraw()">적용하기</button>
    </div>
  </div>
</div>

<div id="authScr">
  <div class="auth-card">
    <h2 style="margin-bottom:20px;text-align:center;">태주전자 로그인</h2>
    <div class="fl"><label>이메일</label><input type="text" id="l_email"></div>
    <div class="fl"><label>비밀번호</label><input type="password" id="l_pw"></div>
    <button class="btn-save" onclick="doLogin()">로그인</button>
  </div>
</div>

<script>
/* =========================================================================
   1. Firebase 설정 (여기에 한솔님의 Firebase Config 값을 넣어주세요)
========================================================================= */
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_PROJECT_ID.firebaseapp.com",
  projectId: "YOUR_PROJECT_ID",
  storageBucket: "YOUR_PROJECT_ID.appspot.com",
  messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
  appId: "YOUR_APP_ID"
};

// firebase.initializeApp(firebaseConfig); // 활성화 필요
// const auth = firebase.auth();
// const db = firebase.firestore();
// const storage = firebase.storage();

/* (테스트용 UI 작동을 위한 목업 데이터 - 실제 연결 시 삭제 가능) */
let currentUser = { uid: 'user1', displayName: '한솔' };
document.getElementById('authScr').style.display = 'none'; // 테스트용

/* =========================================================================
   2. 전역 상태 관리
========================================================================= */
let currentBoard = 'records'; // 'records' 또는 'guides'
let unsubscribe = null;
let currentBlocks = []; // 사진 데이터 배열 { id, b64 }

function toast(msg, type='ok') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.background = type==='err' ? 'var(--danger)' : '#10B981';
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

function showLoading() { document.getElementById('ld').classList.add('on'); }
function hideLoading() { document.getElementById('ld').classList.remove('on'); }

/* =========================================================================
   3. 게시판 전환 및 리스트 로드
========================================================================= */
function setBoard(board) {
  currentBoard = board;
  document.getElementById('tabRecords').classList.toggle('active', board === 'records');
  document.getElementById('tabGuides').classList.toggle('active', board === 'guides');
  loadPosts();
}

function loadPosts() {
  // 실제 Firebase 연동 시 사용될 로직
  /*
  if(unsubscribe) unsubscribe();
  showLoading();
  unsubscribe = db.collection(currentBoard).orderBy('createdAt', 'desc').onSnapshot(snap => {
    hideLoading();
    const rlist = document.getElementById('rlist');
    rlist.innerHTML = '';
    if(snap.empty) {
      rlist.innerHTML = `<div class="empty-state"><i class="ti ti-database"></i><p>등록된 게시글이 없습니다.</p></div>`;
      return;
    }
    snap.forEach(doc => {
      const data = doc.data();
      renderCard(doc.id, data);
    });
  });
  */
  
  // 목업 렌더링 (테스트용)
  const rlist = document.getElementById('rlist');
  const boardName = currentBoard === 'records' ? '수리 일지' : '가이드 게시판';
  rlist.innerHTML = `
    <div class="rcard" onclick="openDetail('mock')">
      <div class="rc-body">
        <div class="rc-top">
          <div class="rc-model">[${boardName}] 테스트 모델 001</div>
        </div>
        <div class="rc-symptom"><b>증상:</b> 전원이 들어오지 않고 빨간불만 깜빡거림.<br><b>조치:</b> 메인보드 전원부 콘덴서 3개 교체 완료.</div>
        <div class="rc-foot">
          <span>작성자: 한솔</span>
          <span>방금 전</span>
        </div>
      </div>
    </div>
  `;
}

// 초기 로드
loadPosts();

/* =========================================================================
   4. 작성 폼 및 사진 그리기 로직
========================================================================= */
function openEditor() {
  document.getElementById('f_model').value = '';
  document.getElementById('f_symptom').value = '';
  document.getElementById('f_action').value = '';
  currentBlocks = [];
  renderBlocks();
  
  document.getElementById('editorTitle').textContent = currentBoard === 'records' ? '새 수리 일지 작성' : '새 가이드 작성';
  document.getElementById('editorOverlay').classList.add('on');
}

function closeEditor() {
  document.getElementById('editorOverlay').classList.remove('on');
}

// 4-1. 사진 선택 시 캔버스 모달 열기
let baseImg = new Image();
let drawCtx;

function handleFileSelect(e) {
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = function(evt) {
    baseImg.src = evt.target.result;
    baseImg.onload = function() {
      openDrawModal();
    }
  };
  reader.readAsDataURL(file);
  e.target.value = ''; // Input 초기화
}

function openDrawModal() {
  document.getElementById('drawOverlay').classList.add('on');
  const canvas = document.getElementById('drawCanvas');
  drawCtx = canvas.getContext('2d');
  
  const wrap = document.getElementById('drawCanvasWrap');
  const ww = wrap.clientWidth;
  const wh = wrap.clientHeight;
  const wr = ww / wh;
  
  // 해상도 조절 (메모리 최적화)
  let iw = baseImg.width;
  let ih = baseImg.height;
  const MAX = 1200;
  if(iw > MAX || ih > MAX) {
    const ir = iw / ih;
    if(iw > ih) { iw = MAX; ih = MAX / ir; }
    else { ih = MAX; iw = MAX * ir; }
  }
  
  canvas.width = iw;
  canvas.height = ih;
  
  // CSS 사이즈 조절 (Contain 형태 구현)
  const ir = iw / ih;
  let dw, dh;
  if(ir > wr) { dw = ww; dh = ww / ir; }
  else { dh = wh; dw = wh * ir; }
  
  canvas.style.width = dw + 'px';
  canvas.style.height = dh + 'px';
  canvas.style.left = (ww - dw)/2 + 'px';
  canvas.style.top = (wh - dh)/2 + 'px';
  
  resetDraw();
}

function resetDraw() {
  drawCtx.clearRect(0, 0, drawCanvas.width, drawCanvas.height);
  drawCtx.drawImage(baseImg, 0, 0, drawCanvas.width, drawCanvas.height);
}

// 4-2. 캔버스 그리기 이벤트
let isDrawing = false;
const drawCanvas = document.getElementById('drawCanvas');

function getMousePos(e) {
  const rect = drawCanvas.getBoundingClientRect();
  const clientX = e.clientX || (e.touches && e.touches[0].clientX);
  const clientY = e.clientY || (e.touches && e.touches[0].clientY);
  return {
    x: (clientX - rect.left) * (drawCanvas.width / rect.width),
    y: (clientY - rect.top) * (drawCanvas.height / rect.height)
  };
}

const startDraw = (e) => {
  isDrawing = true;
  const pos = getMousePos(e);
  drawCtx.beginPath();
  drawCtx.moveTo(pos.x, pos.y);
  drawCtx.strokeStyle = '#EF4444'; // 강조용 빨간색
  drawCtx.lineWidth = Math.max(4, drawCanvas.width / 150); // 해상도 비례 두께
  drawCtx.lineCap = 'round';
  drawCtx.lineJoin = 'round';
};

const moveDraw = (e) => {
  if(!isDrawing) return;
  e.preventDefault(); // 모바일 스크롤 방지
  const pos = getMousePos(e);
  drawCtx.lineTo(pos.x, pos.y);
  drawCtx.stroke();
};

const endDraw = () => { isDrawing = false; };

drawCanvas.addEventListener('mousedown', startDraw);
drawCanvas.addEventListener('mousemove', moveDraw);
drawCanvas.addEventListener('mouseup', endDraw);
drawCanvas.addEventListener('mouseout', endDraw);

drawCanvas.addEventListener('touchstart', startDraw, {passive: false});
drawCanvas.addEventListener('touchmove', moveDraw, {passive: false});
drawCanvas.addEventListener('touchend', endDraw);

// 4-3. 그린 사진 적용 및 블록 렌더링
function applyDraw() {
  const dataUrl = drawCanvas.toDataURL('image/jpeg', 0.85);
  currentBlocks.push({ id: Date.now(), b64: dataUrl });
  document.getElementById('drawOverlay').classList.remove('on');
  renderBlocks();
}

function renderBlocks() {
  const list = document.getElementById('blockList');
  list.innerHTML = '';
  currentBlocks.forEach(blk => {
    const div = document.createElement('div');
    div.className = 'blk-item';
    div.innerHTML = `
      <img src="${blk.b64}">
      <button class="blk-del" onclick="removeBlock(${blk.id})"><i class="ti ti-trash"></i></button>
    `;
    list.appendChild(div);
  });
}

function removeBlock(id) {
  currentBlocks = currentBlocks.filter(b => b.id !== id);
  renderBlocks();
}

/* =========================================================================
   5. 저장 및 로그인 로직 (연동 시 사용)
========================================================================= */
async function savePost() {
  const model = document.getElementById('f_model').value.trim();
  const symptom = document.getElementById('f_symptom').value.trim();
  const action = document.getElementById('f_action').value.trim();

  if(!model || !symptom || !action) {
    toast('모델명, 증상, 조치내용을 모두 입력해주세요.', 'err');
    return;
  }

  showLoading();
  // Firebase Storage 및 Firestore 업로드 로직 구성
  // 1. currentBlocks의 b64 데이터를 storage.ref().putString(b.b64, 'data_url') 로 업로드 후 URL 확보
  // 2. db.collection(currentBoard).add({ model, symptom, action, images: urlArray, ... }) 저장
  
  setTimeout(() => { // 테스트용 타임아웃
    hideLoading();
    closeEditor();
    toast('저장되었습니다.');
    loadPosts();
  }, 1000);
}

function doLogin() {
  // auth.signInWithEmailAndPassword(email, pw)
  document.getElementById('authScr').style.display = 'none';
  toast('환영합니다!');
}

</script>
</body>
</html>
