<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>태주전자 수리 일지</title>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-storage-compat.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F1F5F9;--white:#FFFFFF;--surface:#FFFFFF;
  --border:#E2E8F0;--border2:#CBD5E1;
  --text:#0F172A;--sub:#475569;--hint:#94A3B8;
  --accent:#6366F1;--ah:#4F46E5;--al:#EEF2FF;--am:#A5B4FC;
  --danger:#EF4444;--dl:#FEF2F2;--ok:#10B981;--ol:#ECFDF5;
  --warn:#F59E0B;--wl:#FFFBEB;--wb:#FDE68A;
  --master:#7C3AED;--mb:#F5F3FF;
  --sh:0 1px 3px rgba(0,0,0,.07),0 1px 2px rgba(0,0,0,.04);
  --shm:0 4px 12px rgba(0,0,0,.08),0 2px 4px rgba(0,0,0,.04);
  --shl:0 10px 25px rgba(0,0,0,.1),0 4px 8px rgba(0,0,0,.06);
  --font:'Pretendard',-apple-system,sans-serif
}
body{background:var(--bg);font-family:var(--font);color:var(--text);min-height:100vh}
.wrap{display:flex;flex-direction:column;min-height:100vh}

/* ── Loading ── */
.ld{position:fixed;inset:0;background:rgba(255,255,255,.92);display:none;align-items:center;justify-content:center;z-index:999;flex-direction:column;gap:14px;backdrop-filter:blur(4px)}
.ld.on{display:flex}
.spin{width:36px;height:36px;border:3px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
.ld-msg{font-size:13px;color:var(--sub);font-weight:500}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── Toast ── */
.toast{position:fixed;bottom:88px;left:50%;transform:translateX(-50%) translateY(20px);background:#1E293B;color:#fff;padding:10px 20px;border-radius:100px;font-size:13px;font-weight:500;opacity:0;transition:all .25s;z-index:1000;white-space:nowrap;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.ok{background:#059669}
.toast.err{background:#DC2626}

/* ── Auth ── */
.auth-scr{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;background:linear-gradient(135deg,#EEF2FF 0%,#F8FAFC 50%,#F0FDF4 100%)}
.auth-card{background:var(--white);border:1px solid var(--border);border-radius:24px;padding:36px 32px;width:100%;max-width:360px;box-shadow:var(--shl)}
.auth-logo{text-align:center;margin-bottom:28px}
.auth-logo img{height:48px;object-fit:contain;margin-bottom:14px}
.auth-title{font-size:20px;font-weight:800;color:var(--text);letter-spacing:-.3px}
.auth-sub{font-size:13px;color:var(--hint);margin-top:4px;line-height:1.6}
.auth-err{font-size:12px;color:var(--danger);background:var(--dl);border:1px solid #FECACA;border-radius:10px;padding:9px 12px;margin-bottom:12px;display:none}
.auth-ok{font-size:12px;color:var(--ok);background:var(--ol);border:1px solid #A7F3D0;border-radius:10px;padding:9px 12px;margin-bottom:12px;display:none}
.af{margin-bottom:12px}
.af label{font-size:11px;font-weight:600;letter-spacing:.6px;text-transform:uppercase;color:var(--hint);display:block;margin-bottom:6px}
.af input{width:100%;background:var(--bg);border:1.5px solid var(--border);color:var(--text);padding:11px 14px;border-radius:10px;font-family:var(--font);font-size:14px;outline:none;transition:border .15s,box-shadow .15s}
.af input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(99,102,241,.1)}
.btn-main{width:100%;background:var(--accent);color:#fff;border:none;padding:13px;border-radius:11px;font-family:var(--font);font-size:15px;font-weight:700;cursor:pointer;margin-top:6px;transition:all .15s;letter-spacing:-.2px}
.btn-main:hover{background:var(--ah);box-shadow:0 4px 12px rgba(99,102,241,.3)}
.btn-main:disabled{opacity:.5;cursor:not-allowed}
.auth-sw{text-align:center;margin-top:16px;font-size:13px;color:var(--sub)}
.auth-sw a{color:var(--accent);cursor:pointer;font-weight:600}
.auth-sw a:hover{text-decoration:underline}

/* ── Sidebar ── */
.sb-overlay{position:fixed;inset:0;background:rgba(15,23,42,.45);z-index:300;display:none;backdrop-filter:blur(2px)}
.sb-overlay.on{display:block}
.sidebar{position:fixed;top:0;left:0;bottom:0;width:76%;max-width:300px;background:var(--white);z-index:301;transform:translateX(-100%);transition:transform .3s cubic-bezier(.4,0,.2,1);box-shadow:var(--shl);display:flex;flex-direction:column}
.sidebar.on{transform:translateX(0)}
.sb-head{padding:20px 18px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.sb-head img{height:30px;object-fit:contain}
.sb-close{width:30px;height:30px;border:none;background:var(--bg);border-radius:8px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--sub);font-size:17px;transition:all .15s}
.sb-close:hover{background:var(--border);color:var(--text)}
.sb-sort{padding:12px 16px;border-bottom:1px solid var(--border)}
.sb-sort-label{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--hint);margin-bottom:8px}
.sb-sort-btns{display:flex;gap:5px;flex-wrap:wrap}
.sb-sort-btn{background:var(--bg);border:1.5px solid var(--border);color:var(--sub);padding:4px 10px;border-radius:20px;font-family:var(--font);font-size:11px;font-weight:600;cursor:pointer;transition:all .15s}
.sb-sort-btn.on{background:var(--accent);border-color:var(--accent);color:#fff}
.sb-sort-btn:hover:not(.on){border-color:var(--am);color:var(--accent)}
.sb-list{flex:1;overflow-y:auto;padding:8px 10px}
.sb-all{display:flex;align-items:center;gap:10px;padding:10px 8px;border-radius:10px;cursor:pointer;margin-bottom:4px;transition:all .15s}
.sb-all:hover,.sb-item:hover{background:var(--al)}
.sb-all.active,.sb-item.active{background:var(--al)}
.sb-all-ico{width:34px;height:34px;border-radius:9px;background:var(--accent);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.sb-all-ico i{font-size:17px;color:#fff}
.sb-all-name{font-size:13px;font-weight:700;color:var(--text);flex:1}
.sb-all-cnt{font-size:11px;font-weight:700;background:var(--al);color:var(--accent);padding:2px 8px;border-radius:20px}
.sb-item{display:flex;align-items:center;gap:10px;padding:9px 8px;border-radius:10px;cursor:pointer;transition:all .15s;margin-bottom:2px}
.sb-ico{width:32px;height:32px;border-radius:8px;background:var(--bg);display:flex;align-items:center;justify-content:center;flex-shrink:0;border:1px solid var(--border)}
.sb-ico i{font-size:15px;color:var(--accent)}
.sb-name{font-size:13px;font-weight:500;color:var(--text);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sb-cnt{font-size:11px;font-weight:700;background:var(--bg);color:var(--hint);padding:2px 7px;border-radius:20px;border:1px solid var(--border);flex-shrink:0}
  /* 게시판 선택 메뉴 스타일 추가 */
.sb-group-label { font-size: 10px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--hint); padding: 16px 16px 8px; border-top: 1px solid var(--border); margin-top: 10px; }
.sb-menu-item { display: flex; align-items: center; gap: 10px; padding: 10px 16px; cursor: pointer; transition: all .15s; color: var(--sub); }
.sb-menu-item i { font-size: 18px; color: var(--hint); }
.sb-menu-item span { font-size: 14px; font-weight: 600; }
.sb-menu-item:hover { background: var(--al); color: var(--accent); }
.sb-menu-item:hover i { color: var(--accent); }
.sb-menu-item.active { background: var(--al); color: var(--accent); }
.sb-menu-item.active i { color: var(--accent); }

/* ── Header ── */
.hdr{background:var(--white);border-bottom:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;gap:8px;position:sticky;top:0;z-index:10;box-shadow:var(--sh)}
.hbtn{width:34px;height:34px;border:1.5px solid var(--border);border-radius:9px;background:var(--white);cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--sub);font-size:17px;flex-shrink:0;transition:all .15s}
.hbtn:hover{border-color:var(--accent);color:var(--accent);background:var(--al)}
.hbtn.on{display:flex}
.back-btn{display:none}
.back-btn.on{display:flex}
.hdr-logo{height:24px;object-fit:contain;flex-shrink:0;cursor:pointer}
.hdr-title{font-size:14px;font-weight:700;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;letter-spacing:-.2px}
.search-wrap{flex:1;max-width:360px;display:flex;align-items:center;gap:6px;background:var(--bg);border:1.5px solid var(--border);border-radius:10px;padding:0 10px;transition:all .15s}
.search-wrap:focus-within{border-color:var(--accent);box-shadow:0 0 0 3px rgba(99,102,241,.1);background:#fff}
.search-wrap i{font-size:15px;color:var(--hint);flex-shrink:0}
.search-input{flex:1;border:none;background:transparent;font-family:var(--font);font-size:13px;color:var(--text);outline:none;padding:7px 0;min-width:0}
.search-input::placeholder{color:var(--hint)}
.btn-add{background:var(--accent);color:#fff;border:none;padding:8px 14px;border-radius:10px;font-family:var(--font);font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:5px;white-space:nowrap;flex-shrink:0;transition:all .15s;box-shadow:0 2px 8px rgba(99,102,241,.25)}
.btn-add:hover{background:var(--ah);box-shadow:0 4px 12px rgba(99,102,241,.35)}
.user-chip{display:flex;align-items:center;gap:5px;background:var(--bg);border:1.5px solid var(--border);border-radius:20px;padding:5px 11px;font-size:12px;font-weight:600;color:var(--sub);flex-shrink:0;cursor:pointer;transition:all .15s}
.user-chip:hover{border-color:var(--border2)}
.user-chip.master{background:var(--mb);border-color:#C4B5FD;color:var(--master)}

.sb-footer{padding:12px 16px;border-top:1px solid var(--border);display:flex;flex-direction:column;gap:8px}
.sb-user-info{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--bg);border-radius:11px;cursor:pointer;transition:all .15s}
.sb-user-info:hover{background:var(--al)}
.sb-user-avatar{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--am));display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:#fff;flex-shrink:0}
.sb-user-name{font-size:13px;font-weight:600;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sb-user-badge{font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px;background:var(--mb);color:var(--master);flex-shrink:0}
.sb-add-btn{background:var(--accent);color:#fff;border:none;padding:11px;border-radius:11px;font-family:var(--font);font-size:13px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;transition:all .15s;box-shadow:0 2px 8px rgba(99,102,241,.25)}
.sb-add-btn:hover{background:var(--ah);box-shadow:0 4px 12px rgba(99,102,241,.35)}

/* ── FAB ── */
.fab{position:fixed;bottom:24px;right:20px;width:54px;height:54px;background:var(--accent);color:#fff;border:none;border-radius:50%;font-size:24px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(99,102,241,.45);z-index:50;transition:all .2s;outline:none}
.fab:hover{background:var(--ah);transform:scale(1.08);box-shadow:0 6px 20px rgba(99,102,241,.55)}
.fab:active{transform:scale(.95)}
.fab i{font-size:22px}
.main{flex:1;padding:18px;max-width:900px;margin:0 auto;width:100%}
.sec-label{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--hint);margin-bottom:13px}

/* ── Sort ── */
.sort-row{display:flex;gap:5px;margin-bottom:14px;flex-wrap:wrap}
.sort-btn{background:var(--white);border:1.5px solid var(--border);border-radius:20px;padding:5px 13px;font-family:var(--font);font-size:11px;font-weight:600;color:var(--sub);cursor:pointer;transition:all .15s;white-space:nowrap;box-shadow:var(--sh)}
.sort-btn.on{background:var(--accent);border-color:var(--accent);color:#fff;box-shadow:0 2px 8px rgba(99,102,241,.3)}
.sort-btn:hover:not(.on){border-color:var(--am);color:var(--accent)}

/* ── Tag grid ── */
.tag-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:22px}
.tag-tile{background:var(--white);border:1.5px solid var(--border);border-radius:16px;aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:all .2s;gap:6px;padding:8px;position:relative;box-shadow:var(--sh)}
.tag-tile:hover{border-color:var(--am);background:var(--al);transform:translateY(-3px);box-shadow:var(--shm)}
.tt-ico{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,var(--al),#DDD6FE);display:flex;align-items:center;justify-content:center}
.tt-ico i{font-size:18px;color:var(--accent)}
.tt-name{font-size:9px;font-weight:700;color:var(--text);text-align:center;word-break:break-all;line-height:1.3}
.tt-cnt{position:absolute;top:6px;right:6px;background:var(--accent);color:#fff;border-radius:20px;font-size:9px;font-weight:700;padding:1px 6px;box-shadow:0 1px 4px rgba(99,102,241,.4)}

/* ── Record cards ── */
.rlist{display:flex;flex-direction:column;gap:10px}
.rcard{background:var(--white);border:1.5px solid var(--border);border-radius:16px;cursor:pointer;transition:all .18s;overflow:hidden;box-shadow:var(--sh)}
.rcard:hover{border-color:var(--am);box-shadow:var(--shm);transform:translateY(-2px)}
.rc-img{width:100%;height:150px;object-fit:cover;display:block}
.rc-body{padding:13px 15px}
.rc-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:5px}
.rc-model{font-size:14px;font-weight:700;color:var(--text);letter-spacing:-.2px}
.rc-assignee{font-size:11px;color:var(--sub);background:var(--bg);border:1px solid var(--border);border-radius:20px;padding:3px 9px;white-space:nowrap;flex-shrink:0;font-weight:500}
.rc-exc{font-size:12px;color:var(--sub);line-height:1.6;margin-bottom:9px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.rc-foot{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:5px}
.rc-tags{display:flex;flex-wrap:wrap;gap:3px}
.pill{background:var(--al);color:var(--accent);font-size:11px;font-weight:600;padding:2px 8px;border-radius:20px}
.rc-date{font-size:11px;color:var(--hint);font-weight:500}
.rc-meta-row{display:flex;align-items:center;gap:8px;margin-top:6px}
.rc-comment-cnt{display:flex;align-items:center;gap:3px;font-size:11px;color:var(--hint)}
.rc-comment-cnt i{font-size:13px}
.hl{background:#FEF08A;border-radius:3px;padding:0 2px}
.search-div{display:flex;align-items:center;gap:10px;margin:16px 0 12px}
.search-div span{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--hint);white-space:nowrap}
.search-div::before,.search-div::after{content:'';flex:1;height:1px;background:var(--border)}
.no-result{text-align:center;padding:32px 20px;color:var(--hint);font-size:13px}
.empty{text-align:center;padding:56px 20px;color:var(--hint)}
.empty i{font-size:48px;display:block;margin-bottom:14px;opacity:.25}
.empty p{font-size:14px;line-height:1.9;font-weight:500}

/* ── Sheet / Overlay ── */
.overlay{position:fixed;inset:0;background:rgba(15,23,42,.4);z-index:100;display:none;flex-direction:column;justify-content:flex-end;backdrop-filter:blur(2px)}
.overlay.on{display:flex}
.sheet{background:var(--white);border-radius:24px 24px 0 0;width:100%;max-height:92vh;overflow-y:auto;padding:20px;box-shadow:0 -8px 30px rgba(0,0,0,.12)}
.sh-handle{width:40px;height:4px;background:var(--border2);border-radius:2px;margin:0 auto 16px}
.sh-title{font-size:16px;font-weight:800;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between;letter-spacing:-.2px}
.btn-x{background:var(--bg);border:none;width:30px;height:30px;border-radius:8px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--sub);font-size:16px;flex-shrink:0;transition:all .15s}
.btn-x:hover{background:var(--border);color:var(--text)}

/* ── Form ── */
.fl{margin-bottom:13px}
.fl label{font-size:10px;font-weight:700;letter-spacing:.7px;text-transform:uppercase;color:var(--hint);display:block;margin-bottom:6px}
input[type=text],input[type=password],select,textarea{width:100%;background:var(--bg);border:1.5px solid var(--border);color:var(--text);padding:10px 13px;border-radius:11px;font-family:var(--font);font-size:13px;outline:none;transition:all .15s;line-height:1.5}
input[type=text]:focus,input[type=password]:focus,select:focus,textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(99,102,241,.1);background:#fff}
textarea{resize:vertical;min-height:72px}
select option{background:var(--white)}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.tag-wrap{background:var(--bg);border:1.5px solid var(--border);border-radius:11px;padding:7px 10px;display:flex;flex-wrap:wrap;gap:5px;cursor:text;transition:all .15s;align-items:center;min-height:42px}
.tag-wrap:focus-within{border-color:var(--accent);box-shadow:0 0 0 3px rgba(99,102,241,.1);background:#fff}
.tchip{background:var(--accent);color:#fff;font-size:12px;font-weight:600;padding:3px 8px;border-radius:20px;display:flex;align-items:center;gap:3px;white-space:nowrap}
.tchip button{background:none;border:none;cursor:pointer;color:rgba(255,255,255,.8);font-size:13px;line-height:1;padding:0}
.tchip button:hover{color:#fff}
.tag-field{border:none;background:transparent;font-family:var(--font);font-size:13px;color:var(--text);outline:none;min-width:80px;flex:1}
.fhint{font-size:11px;color:var(--hint);margin-top:5px}
.fav-row{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px}
.fav-btn{display:flex;align-items:center;gap:4px;background:var(--white);border:1.5px solid var(--border);border-radius:20px;padding:4px 10px;font-family:var(--font);font-size:11px;font-weight:600;color:var(--sub);cursor:pointer;transition:all .15s;white-space:nowrap;box-shadow:var(--sh)}
.fav-btn:hover,.fav-btn.used{border-color:var(--accent);color:var(--accent);background:var(--al)}
.fav-star{font-size:11px;cursor:pointer;color:var(--hint);background:none;border:none;padding:0;line-height:1;transition:color .15s}
.fav-star.on{color:#F59E0B}

/* ── Blocks ── */
.block-list{display:flex;flex-direction:column;gap:8px;margin-bottom:8px}
.blk{position:relative;background:var(--bg);border:1.5px solid var(--border);border-radius:12px;overflow:hidden}
.blk img{width:100%;max-height:240px;object-fit:cover;display:block}
.blk textarea{width:100%;background:transparent;border:none;font-family:var(--font);font-size:13px;color:var(--text);padding:11px 13px;resize:none;outline:none;min-height:78px;line-height:1.7;display:block}
.blk-actions{position:absolute;top:7px;right:7px;display:flex;gap:4px;z-index:2}
.blk-btn{background:rgba(255,255,255,.95);border:1px solid var(--border);width:26px;height:26px;border-radius:7px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;color:var(--sub);transition:all .15s;backdrop-filter:blur(4px)}
.blk-btn:hover{background:#fff;color:var(--accent);border-color:var(--accent)}
.blk-btn.del:hover{color:var(--danger);border-color:var(--danger)}
.add-blk-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:13px}
.btn-blk{background:var(--al);color:var(--accent);border:1.5px dashed #A5B4FC;border-radius:11px;padding:11px;font-family:var(--font);font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:5px;transition:all .15s}
.btn-blk:hover{background:#DDD6FE;border-color:var(--accent)}
.btn-save{width:100%;background:var(--accent);color:#fff;border:none;padding:13px;border-radius:12px;font-family:var(--font);font-size:14px;font-weight:700;cursor:pointer;transition:all .15s;box-shadow:0 2px 8px rgba(99,102,241,.25);letter-spacing:-.2px}
.btn-save:hover{background:var(--ah);box-shadow:0 4px 14px rgba(99,102,241,.35)}
.btn-save:disabled{opacity:.5;cursor:not-allowed}

/* ── Detail ── */
.det-tags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:13px;padding-bottom:13px;border-bottom:1px solid var(--border)}
.det-meta{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:16px}
.det-meta-item{font-size:12px;color:var(--sub);display:flex;align-items:center;gap:4px;font-weight:500}
.det-meta-item i{font-size:14px;color:var(--hint)}
.vblk{margin-bottom:14px}
.vblk-img-wrap{position:relative;display:inline-block;width:100%}
.vblk img{width:100%;border-radius:13px;border:1px solid var(--border);display:block;cursor:zoom-in}
.img-copy-btn{position:absolute;top:8px;right:8px;background:rgba(255,255,255,.92);border:1px solid var(--border);padding:5px 10px;border-radius:20px;font-family:var(--font);font-size:11px;font-weight:600;color:var(--sub);cursor:pointer;display:flex;align-items:center;gap:4px;backdrop-filter:blur(4px);transition:all .15s}
.img-copy-btn:hover{background:#fff;color:var(--accent);border-color:var(--accent)}
.img-size-bar{display:flex;gap:4px;margin-top:6px;justify-content:flex-end}
.img-size-btn{background:var(--bg);border:1.5px solid var(--border);color:var(--sub);padding:3px 10px;border-radius:20px;font-family:var(--font);font-size:11px;font-weight:600;cursor:pointer;transition:all .15s}
.img-size-btn:hover{border-color:var(--accent);color:var(--accent)}
.img-size-btn.on{background:var(--accent);border-color:var(--accent);color:#fff}
.vblk p{font-size:14px;color:var(--text);line-height:1.85;white-space:pre-wrap}
.det-btn-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:14px}
.btn-edit{background:var(--al);color:var(--accent);border:1.5px solid #C7D2FE;border-radius:11px;padding:11px;font-family:var(--font);font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:5px;transition:all .15s}
.btn-edit:hover{background:#DDD6FE}
.btn-del{background:transparent;border:1.5px solid #FECACA;color:var(--danger);padding:11px;border-radius:11px;font-family:var(--font);font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:5px;transition:all .15s}
.btn-del:hover{background:var(--dl)}
.btn-del-full{width:100%;background:transparent;border:1.5px solid #FECACA;color:var(--danger);padding:11px;border-radius:11px;font-family:var(--font);font-size:14px;font-weight:600;cursor:pointer;margin-top:8px;display:flex;align-items:center;justify-content:center;gap:5px;transition:all .15s}
.btn-del-full:hover{background:var(--dl)}

/* ── Edit History ── */
.hist-section{margin-top:16px;border-top:1px solid var(--border);padding-top:14px}
.hist-title{font-size:11px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--hint);margin-bottom:10px;display:flex;align-items:center;gap:6px;cursor:pointer}
.hist-list{display:flex;flex-direction:column;gap:0}
.hist-item{display:flex;align-items:flex-start;gap:10px;padding:7px 0;position:relative}
.hist-item:not(:last-child)::before{content:'';position:absolute;left:10px;top:28px;bottom:-4px;width:1px;background:var(--border)}
.hist-dot{width:20px;height:20px;border-radius:50%;background:var(--al);border:2px solid var(--am);display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.hist-dot i{font-size:10px;color:var(--accent)}
.hist-dot.created{background:#DCFCE7;border-color:#86EFAC}
.hist-dot.created i{color:#16A34A}
.hist-info{flex:1}
.hist-action{font-size:12px;font-weight:600;color:var(--text)}
.hist-by{font-size:11px;color:var(--hint)}

/* ── Comments ── */
.comment-section{margin-top:16px;border-top:1px solid var(--border);padding-top:14px}
.comment-title{font-size:11px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--hint);margin-bottom:12px;display:flex;align-items:center;gap:6px}
.comment-title span{background:var(--accent);color:#fff;border-radius:20px;font-size:10px;padding:1px 7px;font-weight:700;letter-spacing:0}
.comment-list{display:flex;flex-direction:column;gap:10px;margin-bottom:13px}
.comment-item{background:var(--bg);border-radius:12px;padding:11px 13px;position:relative}
.comment-header{display:flex;align-items:center;gap:6px;margin-bottom:5px}
.comment-avatar{width:26px;height:26px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--am));display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;flex-shrink:0}
.comment-author{font-size:12px;font-weight:700;color:var(--text)}
.comment-time{font-size:11px;color:var(--hint);margin-left:auto}
.comment-text{font-size:13px;color:var(--sub);line-height:1.6}
.comment-del{position:absolute;top:10px;right:10px;background:none;border:none;cursor:pointer;color:var(--hint);font-size:14px;padding:2px;transition:color .15s;display:none}
.comment-item:hover .comment-del{display:block}
.comment-del:hover{color:var(--danger)}
.comment-input-row{display:flex;gap:8px;align-items:flex-end}
.comment-input{flex:1;background:var(--bg);border:1.5px solid var(--border);color:var(--text);padding:9px 12px;border-radius:11px;font-family:var(--font);font-size:13px;outline:none;resize:none;min-height:42px;max-height:120px;transition:all .15s;line-height:1.5}
.comment-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(99,102,241,.1);background:#fff}
.comment-send{background:var(--accent);color:#fff;border:none;width:40px;height:40px;border-radius:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0;transition:all .15s}
.comment-send:hover{background:var(--ah)}
.comment-empty{text-align:center;padding:20px;color:var(--hint);font-size:13px}

/* ── Settings ── */
.set-section{margin-bottom:20px}
.set-section-title{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--hint);margin-bottom:10px;display:flex;align-items:center;gap:6px}
.set-info{background:var(--bg);border-radius:12px;padding:13px;font-size:13px;color:var(--sub);display:flex;align-items:center;gap:9px;margin-bottom:13px;font-weight:500}
.set-info i{font-size:18px;color:var(--accent)}
.user-row{display:flex;align-items:center;gap:8px;padding:10px 12px;background:var(--bg);border-radius:11px;margin-bottom:6px}
.u-name{font-size:13px;font-weight:600;flex:1}
.u-badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;flex-shrink:0}
.u-badge.master{background:var(--mb);color:var(--master)}
.u-badge.user{background:var(--al);color:var(--accent)}
.u-badge.pending{background:var(--wl);color:var(--warn)}
.u-toggle{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--sub);cursor:pointer;flex-shrink:0}
.u-toggle input{cursor:pointer;accent-color:var(--accent)}
.u-del{background:none;border:none;color:var(--hint);cursor:pointer;font-size:15px;padding:3px;flex-shrink:0;transition:color .15s}
.u-del:hover{color:var(--danger)}
.toggle-row{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;background:var(--bg);border-radius:11px;margin-bottom:8px}
.toggle-label{font-size:13px;font-weight:600;color:var(--text)}
.toggle-sub{font-size:11px;color:var(--hint);margin-top:2px}
.toggle-switch{position:relative;width:44px;height:24px;flex-shrink:0}
.toggle-switch input{opacity:0;width:0;height:0}
.toggle-slider{position:absolute;inset:0;background:var(--border2);border-radius:20px;cursor:pointer;transition:.25s}
.toggle-slider:before{content:'';position:absolute;width:18px;height:18px;left:3px;top:3px;background:#fff;border-radius:50%;transition:.25s;box-shadow:0 1px 4px rgba(0,0,0,.2)}
.toggle-switch input:checked + .toggle-slider{background:var(--accent)}
.toggle-switch input:checked + .toggle-slider:before{transform:translateX(20px)}
.sep{height:1px;background:var(--border);margin:18px 0}
.pending-section{background:var(--wl);border:1.5px solid var(--wb);border-radius:12px;padding:12px;margin-bottom:14px}
.pending-title{font-size:11px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--warn);margin-bottom:10px;display:flex;align-items:center;gap:6px}
.pending-item{display:flex;align-items:center;gap:8px;padding:8px 10px;background:#fff;border-radius:9px;margin-bottom:6px}
.pending-name{font-size:13px;font-weight:600;flex:1}
.btn-approve{background:var(--accent);color:#fff;border:none;padding:5px 13px;border-radius:8px;font-family:var(--font);font-size:12px;font-weight:600;cursor:pointer;transition:all .15s}
.btn-approve:hover{background:var(--ah)}

  /* ========== [추가] 게시판 분리 탭 & 캔버스 CSS ========== */
.board-tabs { display:flex; gap:4px; background:var(--bg); border-radius:10px; padding:4px; margin-left:12px; margin-right:auto; }
.board-tab { background:transparent; border:none; font-family:var(--font); font-size:13px; font-weight:700; color:var(--hint); padding:6px 12px; border-radius:8px; cursor:pointer; transition:all .15s; }
.board-tab.active { background:var(--white); color:var(--accent); box-shadow:var(--sh); }

#drawCanvasWrap { flex:1; background:#000; border-radius:12px; position:relative; overflow:hidden; margin-bottom:16px; width:100%; min-height:400px; touch-action: none; }
#drawCanvas { position:absolute; cursor:crosshair; }
.draw-btns { display:flex; gap:10px; }
.btn-reset { flex:1; background:var(--bg); color:var(--sub); border:none; padding:14px; border-radius:12px; font-weight:700; cursor:pointer; font-family:var(--font); }

}
</style>
</head>

function fd(d){if(!d)return'';return new Date(d).toLocaleDateString('ko-KR',{month:'short',day:'numeric'});}
function fdFull(d){if(!d)return'';return new Date(d).toLocaleDateString('ko-KR',{year:'numeric',month:'long',day:'numeric'});}
function timeAgo(d){if(!d)return'';const diff=(Date.now()-new Date(d))/1000;if(diff<60)return '방금';if(diff<3600)return Math.floor(diff/60)+'분 전';if(diff<86400)return Math.floor(diff/3600)+'시간 전';return Math.floor(diff/86400)+'일 전';}
function hl(text,q){if(!q||!text)return text||'';const idx=text.toLowerCase().indexOf(q.toLowerCase());if(idx<0)return text;return text.slice(0,idx)+'<span class="hl">'+text.slice(idx,idx+q.length)+'</span>'+text.slice(idx+q.length);}
const TICO={액정:'ti-device-mobile',배터리:'ti-battery-charging',충전:'ti-plug',카메라:'ti-camera',스피커:'ti-volume',마이크:'ti-microphone',수분:'ti-droplet',기판:'ti-cpu',삼성:'ti-device-mobile',애플:'ti-brand-apple',아이폰:'ti-brand-apple',갤럭시:'ti-device-mobile',픽셀:'ti-brand-google',후면:'ti-square-rounded',버튼:'ti-square'};
function ticon(t){const k=Object.keys(TICO).find(k=>t.includes(k));return k?TICO[k]:'ti-hash';}

// ═══ Auth State ═══
auth.onAuthStateChanged(async(fu)=>{
  if(isRegistering)return;
  if(fu){
    ld(true,'사용자 확인 중...');
    try{
      const doc=await db.collection('users').doc(fu.uid).get();
      if(doc.exists){
        const ud=doc.data();
        if(ud.status==='pending'){await auth.signOut();showAuthScreen();showLogin('⏳ 마스터 승인 후 로그인 가능합니다.');ld(false);return;}
        currentUser={uid:fu.uid,...ud};
        await enterApp();
      }else{await auth.signOut();}
    }catch(e){console.error(e);ld(false);showAuthScreen();}
  }else{
    ld(true,'초기화 중...');
    currentUser=null;
    if(unsubRecords){unsubRecords();unsubRecords=null;}
    try{
      const snap=await db.collection('users').limit(1).get();
      showAuthScreen();
      if(snap.empty)showRegister(true);else showLogin();
    }catch(e){showAuthScreen();showLogin();}
    ld(false);
  }
});

async function doLogin(){
  const username=document.getElementById('lid').value.trim(),pw=document.getElementById('lpw').value,e=document.getElementById('ae');
  e.style.display='none';
  if(!username||!pw){e.textContent='아이디와 비밀번호를 입력해주세요';e.style.display='block';return;}
  const btn=document.getElementById('loginBtn');btn.disabled=true;btn.textContent='로그인 중...';
  try{
    const q=await db.collection('users').where('username','==',username).limit(1).get();
    if(q.empty)throw new Error('not-found');
    const ud=q.docs[0].data();
    if(ud.status==='pending'){e.textContent='⏳ 마스터 승인 후 로그인 가능합니다.';e.style.display='block';btn.disabled=false;btn.textContent='로그인';return;}
    await auth.signInWithEmailAndPassword(ud.email,pw);
  }catch(err){e.textContent='아이디 또는 비밀번호가 올바르지 않아요';e.style.display='block';btn.disabled=false;btn.textContent='로그인';if(document.getElementById('lpw'))document.getElementById('lpw').value='';}
}

async function doRegister(isFirst){
  const username=document.getElementById('rid').value.trim(),pw=document.getElementById('rpw').value,pw2=document.getElementById('rpw2').value,e=document.getElementById('ae');
  e.style.display='none';
  if(!username){e.textContent='아이디를 입력해주세요';e.style.display='block';return;}
  if(pw.length<6){e.textContent='비밀번호는 6자 이상이어야 해요';e.style.display='block';return;}
  if(pw!==pw2){e.textContent='비밀번호가 일치하지 않아요';e.style.display='block';return;}
  const btn=document.getElementById('regBtn');btn.disabled=true;btn.textContent='처리 중...';
  isRegistering=true;
  try{
    const q=await db.collection('users').where('username','==',username).limit(1).get();
    if(!q.empty){e.textContent='이미 사용 중인 아이디예요';e.style.display='block';btn.disabled=false;btn.textContent='계정 만들기';isRegistering=false;return;}
    const snap=await db.collection('users').limit(1).get();
    const willBeMaster=snap.empty;
    const fakeEmail=`u${Date.now()}${Math.random().toString(36).slice(2,6)}@taeju.repair`;
    const cred=await auth.createUserWithEmailAndPassword(fakeEmail,pw);
    const userData={username,email:fakeEmail,isMaster:willBeMaster,canDelete:willBeMaster,status:willBeMaster?'approved':'pending',createdAt:firebase.firestore.FieldValue.serverTimestamp()};
    await db.collection('users').doc(cred.user.uid).set(userData);
    isRegistering=false;
    if(willBeMaster){currentUser={uid:cred.user.uid,...userData};await enterApp();}
    else{await auth.signOut();showAuthScreen();showLogin('✅ 가입 신청 완료! 마스터 승인 후 로그인하세요.');}
  }catch(err){console.error(err);e.textContent='계정 생성에 실패했어요.';e.style.display='block';btn.disabled=false;btn.textContent='계정 만들기';isRegistering=false;}
}

// ═══ App Entry ═══
async function enterApp(){
  document.getElementById('authScr').style.display='none';
  document.getElementById('appScr').style.display='flex';
  const chip=document.getElementById('userChip');
  chip.innerHTML=`<i class="ti ${currentUser.isMaster?'ti-shield-check':'ti-user'}" style="font-size:13px"></i>${currentUser.username}`;
  chip.className='user-chip'+(currentUser.isMaster?' master':'');
  // FAB 표시
  const fab=document.getElementById('fab');
  if(fab)fab.style.display='flex';
  // 사이드바 유저 정보 업데이트
  const sbAvatar=document.getElementById('sbUserAvatar');
  const sbName=document.getElementById('sbUserName');
  const sbBadge=document.querySelector('.sb-user-badge');
  if(sbAvatar)sbAvatar.textContent=(currentUser.username||'?').charAt(0).toUpperCase();
  if(sbName){
    sbName.textContent=currentUser.username||'사용자';
    if(currentUser.isMaster){
      sbName.insertAdjacentHTML('afterend','<span class="sb-user-badge">마스터</span>');
    }
  }
  try{
    const fd=await db.collection('users').doc(currentUser.uid).collection('prefs').doc('favTags').get();
    favTags=fd.exists?(fd.data().tags||[]):[];
    const nd=await db.collection('users').doc(currentUser.uid).collection('prefs').doc('notif').get();
    notifEnabled=nd.exists?(nd.data().enabled||false):false;
  }catch(e){favTags=[];}
  subscribeRecords();
  ld(false);
}

function subscribeRecords(){
  if(unsubRecords)unsubRecords();
  const prev=records.length;
  unsubRecords=db.collection(currentBoardCollection).orderBy('date','desc').onSnapshot(snap=>{
    const newRecs=snap.docs.map(d=>({id:d.id,...d.data()}));
    // Notification for new records by others
    if(prev>0&&notifEnabled&&newRecs.length>records.length){
      const added=newRecs.find(r=>!records.find(x=>x.id===r.id));
      if(added&&added.createdBy!==currentUser.uid) triggerNotif(added);
    }
    records=newRecs;
    render();
    renderSidebar();
  },err=>console.error(err));
}

// ═══ Notifications ═══
async function toggleNotif(val){
  notifEnabled=val;
  if(val&&Notification.permission==='default'){
    const perm=await Notification.requestPermission();
    if(perm!=='granted'){notifEnabled=false;toast('알림 권한이 거부됐어요','err');renderSettingsSheet();return;}
  }
  await db.collection('users').doc(currentUser.uid).collection('prefs').doc('notif').set({enabled:notifEnabled});
  toast(notifEnabled?'알림이 켜졌어요 🔔':'알림이 꺼졌어요');
}

// ═══ Sidebar ═══
function openSidebar(){document.getElementById('sidebar').classList.add('on');document.getElementById('sbOverlay').classList.add('on');renderSidebar();}
function closeSidebar(){document.getElementById('sidebar').classList.remove('on');document.getElementById('sbOverlay').classList.remove('on');}

function setSbSort(s){
  sbSort=s;
  ['alpha','ralpha','count','recent'].forEach(k=>{document.getElementById('sbs-'+k)?.classList.toggle('on',k===s);});
  renderSidebar();
}

function renderSidebar(){
  const cnt={};
  const latest={};
  records.forEach(r=>{
    const m=r.model||'미입력';
    cnt[m]=(cnt[m]||0)+1;
    if(!latest[m]||r.date>latest[m])latest[m]=r.date;
  });
  let models=Object.keys(cnt);
  if(sbSort==='alpha')models.sort((a,b)=>a.localeCompare(b,'ko'));
  else if(sbSort==='ralpha')models.sort((a,b)=>b.localeCompare(a,'ko'));
  else if(sbSort==='count')models.sort((a,b)=>cnt[b]-cnt[a]);
  else if(sbSort==='recent')models.sort((a,b)=>(latest[b]||'').localeCompare(latest[a]||''));

  const active=sidebarModel;
  const el=document.getElementById('sbList');
  const allActive=!active;
  el.innerHTML=`
    <div class="sb-all${allActive?' active':''}" onclick="sbSelectModel(null)">
      <div class="sb-all-ico"><i class="ti ti-layout-grid"></i></div>
      <span class="sb-all-name">전체 보기</span>
      <span class="sb-all-cnt">${records.length}</span>
    </div>
    ${models.map(m=>`
      <div class="sb-item${active===m?' active':''}" onclick="sbSelectModel('${esc(m)}')">
        <div class="sb-ico"><i class="ti ${ticon(m)}"></i></div>
        <span class="sb-name">${m}</span>
        <span class="sb-cnt">${cnt[m]}</span>
      </div>`).join('')}`;
}

function sbSelectModel(m){
  sidebarModel=m;
  activeTag=null;
  view=m?'records':'home';
  closeSidebar();
  render();
}

// ═══ Search / Filter / Sort ═══
function getQ(){return(document.getElementById('searchInput')?.value||'').trim().toLowerCase().replace(/^#/,'');}
function filteredTags(q){
  const cnt={};records.forEach(r=>(r.tags||[]).forEach(t=>{cnt[t]=(cnt[t]||0)+1;}));
  const all=Object.entries(cnt).sort((a,b)=>b[1]-a[1]);
  return q?all.filter(([t])=>t.toLowerCase().includes(q)):all;
}
function applySort(arr){
  const a=[...arr];
  if(sortMode==='newest')return a.sort((x,y)=>(y.date||'').localeCompare(x.date||''));
  if(sortMode==='oldest')return a.sort((x,y)=>(x.date||'').localeCompare(y.date||''));
  if(sortMode==='model')return a.sort((x,y)=>(x.model||'').localeCompare(y.model||'','ko'));
  if(sortMode==='assignee')return a.sort((x,y)=>(x.assignee||'').localeCompare(y.assignee||'','ko'));
  return a;
}
function filteredRecords(q,tagFilter,modelFilter){
  let base=records;
  if(modelFilter)base=base.filter(r=>(r.model||'미입력')===modelFilter);
  if(tagFilter)base=base.filter(r=>(r.tags||[]).includes(tagFilter));
  if(q)base=base.filter(r=>(r.model||'').toLowerCase().includes(q)||(r.tags||[]).join(' ').toLowerCase().includes(q)||(r.firstText||'').toLowerCase().includes(q)||(r.assignee||'').toLowerCase().includes(q));
  return applySort(base);
}
function setSort(s){sortMode=s;render();}
function onSearch(){render();}

// ═══ Render ═══
function render(){
  if(!currentUser)return;
  const m=document.getElementById('main'),bb=document.getElementById('backBtn'),ht=document.getElementById('hdrTitle');
  if(view==='home'&&!sidebarModel){bb.classList.remove('on');ht.textContent='수리 일지';renderHome(m);}
  else{bb.classList.add('on');ht.textContent=sidebarModel?sidebarModel:(activeTag?'#'+activeTag:'전체 기록');renderRecs(m);}
}

function sortUI(){
  const labels={newest:'최신순',oldest:'오래된순',model:'모델명순',assignee:'담당자순'};
  return`<div class="sort-row">${Object.entries(labels).map(([k,v])=>`<button class="sort-btn${sortMode===k?' on':''}" onclick="setSort('${k}')">${v}</button>`).join('')}</div>`;
}

function renderHome(el){
  const q=getQ(),tags=filteredTags(q),searchRecs=q?filteredRecords(q,null,null):[],recent=!q?applySort(records).slice(0,4):[];
  if(!tags.length&&!searchRecs.length&&!recent.length){el.innerHTML=`<div class="empty"><i class="ti ti-device-mobile"></i><p>아직 수리 기록이 없어요.<br>추가 버튼으로 시작해보세요.</p></div>`;return;}
  let html='';
  if(tags.length)html+=`<div class="sec-label">태그 아카이브</div><div class="tag-grid">${tags.map(([t,c])=>`<div class="tag-tile" onclick="openTag('${esc(t)}')"><div class="tt-ico"><i class="ti ${ticon(t)}"></i></div><span class="tt-name">${q?hl('#'+t,'#'+q):'#'+t}</span><span class="tt-cnt">${c}</span></div>`).join('')}</div>`;
  if(q&&searchRecs.length)html+=`<div class="search-div"><span>검색 결과 ${searchRecs.length}건</span></div>${sortUI()}<div class="rlist">${searchRecs.map(r=>rcHTML(r,q)).join('')}</div>`;
  else if(q&&!searchRecs.length&&!tags.length)html+=`<div class="no-result"><i class="ti ti-search-off" style="font-size:32px;display:block;margin-bottom:10px;opacity:.3"></i>"${q}"에 해당하는 결과가 없어요</div>`;
  if(!q&&recent.length)html+=`<div style="margin-top:${tags.length?22:0}px"><div class="sec-label" style="display:flex;align-items:center;justify-content:space-between">최근 기록 ${records.length>4?`<button onclick="openAll()" style="font-family:var(--font);font-size:12px;font-weight:600;color:var(--accent);background:none;border:none;cursor:pointer;text-decoration:underline">전체보기</button>`:''}</div>${sortUI()}<div class="rlist">${recent.map(r=>rcHTML(r,'')).join('')}</div></div>`;
  el.innerHTML=html;
}

function renderRecs(el){
  const q=getQ(),items=filteredRecords(q,activeTag,sidebarModel);
  if(!items.length){el.innerHTML=`<div class="empty"><i class="ti ti-file-off"></i><p>기록이 없습니다.</p></div>`;return;}
  el.innerHTML=`<div class="sec-label">${items.length}건</div>${sortUI()}<div class="rlist">${items.map(r=>rcHTML(r,q)).join('')}</div>`;
}

function rcHTML(r,q){
  const model=q?hl(r.model||'모델 미입력',q):r.model||'모델 미입력';
  const exc=r.firstText?(q?hl(r.firstText,q):r.firstText):'';
  const cmtCnt=r.commentCount||0;
  return`<div class="rcard" onclick="openDetail('${r.id}')">
    ${r.thumbUrl?`<img class="rc-img" src="${r.thumbUrl}" alt="">` :''}
    <div class="rc-body">
      <div class="rc-top"><div class="rc-model">${model}</div>${r.assignee?`<span class="rc-assignee">${r.assignee}</span>`:''}</div>
      ${exc?`<div class="rc-exc">${exc}</div>`:''}
      <div class="rc-foot">
        <div class="rc-tags">${(r.tags||[]).map(t=>`<span class="pill">${q?hl('#'+t,'#'+q):'#'+t}</span>`).join('')}</div>
        <span class="rc-date">${fd(r.date)}</span>
      </div>
      ${cmtCnt?`<div class="rc-meta-row"><span class="rc-comment-cnt"><i class="ti ti-message-2"></i>${cmtCnt}개의 댓글</span></div>`:''}
    </div>
  </div>`;
}

function openTag(t){activeTag=t;sidebarModel=null;view='records';render();}
function openAll(){activeTag=null;sidebarModel=null;view='records';render();}
function goHome(){activeTag=null;sidebarModel=null;view='home';render();}

// ═══ Favs ═══
async function saveFavs(){if(!currentUser)return;try{await db.collection('users').doc(currentUser.uid).collection('prefs').doc('favTags').set({tags:favTags});}catch(e){}}
function getQuickTags(){
  const cnt={};records.forEach(r=>(r.tags||[]).forEach(t=>{cnt[t]=(cnt[t]||0)+1;}));
  const starred=favTags.filter(t=>!aTags.includes(t));
  const byFreq=Object.entries(cnt).sort((a,b)=>b[1]-a[1]).map(([t])=>t).filter(t=>!favTags.includes(t)&&!aTags.includes(t));
  return[...starred,...byFreq].slice(0,12);
}
function toggleFav(t){if(favTags.includes(t))favTags=favTags.filter(x=>x!==t);else favTags=[...favTags,t];saveFavs();renderFavRow();}
function pickFavTag(t){if(aTags.includes(t))return;aTags.push(t);renderTChips();renderFavRow();}
function renderFavRow(){
  const el=document.getElementById('favRow');if(!el)return;
  const q=getQuickTags();
  if(!q.length){el.innerHTML=`<span style="font-size:11px;color:var(--hint)">태그를 추가하면 여기 표시돼요</span>`;return;}
  el.innerHTML=q.map(t=>{const isFav=favTags.includes(t),isUsed=aTags.includes(t);return`<button class="fav-btn${isUsed?' used':''}" onclick="pickFavTag('${esc(t)}')"><i class="ti ${ticon(t)}"></i>#${t}<button class="fav-star${isFav?' on':''}" onclick="event.stopPropagation();toggleFav('${esc(t)}')"><i class="ti ${isFav?'ti-star-filled':'ti-star'}"></i></button></button>`;}).join('');}
function tagKey(e){
  const inp=document.getElementById('tfield'),v=inp.value.replace(/^#/,'').replace(/,/g,'').trim();
  if((e.key==='Enter'||e.key===',')&&v){e.preventDefault();if(!aTags.includes(v)){aTags.push(v);renderTChips();renderFavRow();}inp.value='';}
  else if(e.key==='Backspace'&&!inp.value&&aTags.length){aTags.pop();renderTChips();renderFavRow();}
}
function renderTChips(){const el=document.getElementById('tchips');if(el)el.innerHTML=aTags.map((t,i)=>`<span class="tchip">#${t}<button onclick="rmTag(${i})">×</button></span>`).join('');}
function rmTag(i){aTags.splice(i,1);renderTChips();renderFavRow();}

// ═══ Form (Add / Edit) ═══
function openAdd(){aBlks=[];aTags=[];editingId=null;openForm(null);}
function openEdit(id){
  const rec=records.find(r=>r.id===id);if(!rec)return;
  editingId=id;aBlks=(rec.blocks||[]).map(b=>({...b}));aTags=[...(rec.tags||[])];
  closeSheet();setTimeout(()=>openForm(rec),50);
}
function openForm(rec){
  document.getElementById('overlay').classList.add('on');
  const allA=[...new Set(records.map(r=>r.assignee).filter(Boolean))];
  const aOpts=allA.length?`<datalist id="aList">${allA.map(a=>`<option value="${a}">`).join('')}</datalist>`:'';

function renderBlks(){
  const el=document.getElementById('blist');if(!el)return;
  el.innerHTML=aBlks.map((b,i)=>`<div class="blk" data-i="${i}">
    ${b.type==='image'?`<img src="${b.previewUrl||b.url||''}" alt="">`:
    `<textarea onchange="aBlks[${i}].content=this.value" oninput="this.style.height='auto';this.style.height=this.scrollHeight+'px'" placeholder="텍스트를 입력하세요...">${b.content||''}</textarea>`}
    <div class="blk-actions">
      ${i>0?`<button class="blk-btn" onclick="moveBlk(${i},-1)" title="위로"><i class="ti ti-chevron-up"></i></button>`:''}
      ${i<aBlks.length-1?`<button class="blk-btn" onclick="moveBlk(${i},1)" title="아래로"><i class="ti ti-chevron-down"></i></button>`:''}
      <button class="blk-btn del" onclick="rmBlk(${i})" title="삭제"><i class="ti ti-trash"></i></button>
    </div>
  </div>`).join('');
  el.querySelectorAll('textarea').forEach(t=>{t.style.height='auto';t.style.height=t.scrollHeight+'px';});
}

function moveBlk(i,dir){
  const ni=i+dir;if(ni<0||ni>=aBlks.length)return;
  [aBlks[i],aBlks[ni]]=[aBlks[ni],aBlks[i]];renderBlks();
}
function addImgBlk(){
  const inp=document.createElement('input');inp.type='file';inp.accept='image/*';
  inp.onchange=e=>{const f=e.target.files[0];if(!f)return;aBlks.push({type:'image',file:f,previewUrl:URL.createObjectURL(f)});renderBlks();};inp.click();
}
function addTxtBlk(){aBlks.push({type:'text',content:''});renderBlks();setTimeout(()=>{const ts=document.querySelectorAll('.blk textarea');if(ts.length)ts[ts.length-1].focus();},50);}
function rmBlk(i){if(aBlks[i].previewUrl&&aBlks[i].file)URL.revokeObjectURL(aBlks[i].previewUrl);aBlks.splice(i,1);renderBlks();}

async function uploadFile(file,path){const ref=storage.ref(path);await ref.put(file);return ref.getDownloadURL();}
async function makeThumb(src){return new Promise(res=>{const img=new Image();img.onload=()=>{const c=document.createElement('canvas'),M=320,ratio=Math.min(M/img.width,M/img.height);c.width=img.width*ratio;c.height=img.height*ratio;c.getContext('2d').drawImage(img,0,0,c.width,c.height);c.toBlob(async blob=>{try{const path=`thumbs/${Date.now()}.jpg`;const ref=storage.ref(path);await ref.put(blob);res(await ref.getDownloadURL());}catch(e){res(null);}}, 'image/jpeg',.75);};img.onerror=()=>res(null);img.src=src;});}

async function submitForm(){
  document.querySelectorAll('.blk[data-i] textarea').forEach(ta=>{const i=parseInt(ta.closest('[data-i]').dataset.i);if(aBlks[i])aBlks[i].content=ta.value;});
  const ti=document.getElementById('tfield');if(ti){const v=ti.value.replace(/^#/,'').replace(/,/g,'').trim();if(v&&!aTags.includes(v))aTags.push(v);}
  const maker=document.getElementById('fmk')?.value,mp=document.getElementById('fmd')?.value.trim();
  const model=[maker,mp].filter(Boolean).join(' ');
  const assignee=document.getElementById('fassignee')?.value.trim()||currentUser.username;
  const btn=document.getElementById('saveBtn');btn.disabled=true;btn.innerHTML='<i class="ti ti-loader"></i> 저장 중...';
  ld(true,'이미지 업로드 중...');
  try{
    // [수정 1] 새 문서 ID 생성 부분
    const recId=editingId||db.collection(currentBoardCollection).doc().id;
    const processedBlocks=[];
    let thumbUrl=editingId?(records.find(r=>r.id===editingId)?.thumbUrl||null):null;
    let firstNewImgPreview=null;
    for(let i=0;i<aBlks.length;i++){
      const b=aBlks[i];
      if(b.type==='image'){
        if(b.file){const url=await uploadFile(b.file,`images/${recId}/${Date.now()}_${i}.jpg`);processedBlocks.push({type:'image',url,path:`images/${recId}/${Date.now()}_${i}.jpg`});if(!firstNewImgPreview)firstNewImgPreview=b.previewUrl;}
        else processedBlocks.push({type:'image',url:b.url,path:b.path||''});
      }else processedBlocks.push({type:'text',content:b.content||''});
    }
    if(firstNewImgPreview){ld(true,'썸네일 생성 중...');const t=await makeThumb(firstNewImgPreview);if(t)thumbUrl=t;}
    const firstText=(processedBlocks.find(b=>b.type==='text')?.content||'').slice(0,120);
    const now=new Date().toISOString();
    ld(true,'저장 중...');
    const histEntry={by:currentUser.username,at:now,action:editingId?'edited':'created'};
    
    if(editingId){
      const old=records.find(r=>r.id===editingId);
      const hist=[...(old?.history||[]),histEntry];
      // [수정 2] 기존 글 업데이트 부분
      await db.collection(currentBoardCollection).doc(editingId).update({model,assignee,tags:[...aTags],blocks:processedBlocks,thumbUrl,firstText,updatedAt:now,history:hist});
    }else{
      // [수정 3] 새 글 저장 부분
      await db.collection(currentBoardCollection).doc(recId).set({model,assignee,tags:[...aTags],blocks:processedBlocks,thumbUrl,firstText,date:now,updatedAt:null,createdBy:currentUser.uid,history:[histEntry],commentCount:0});
    }
    editingId=null;closeSheet();toast(editingId?'수정됐어요!':'저장됐어요!','ok');
  }catch(err){console.error(err);toast('저장에 실패했어요','err');btn.disabled=false;btn.innerHTML='<i class="ti ti-device-floppy"></i> 저장하기';}
  finally{ld(false);}
}

// ═══ Image Size Control ═══
const IMG_SIZES={S:'25%',M:'50%',L:'75%',전체:'100%'};
function setImgSize(btn,imgId,size){
  const img=document.getElementById(imgId);if(!img)return;
  img.style.width=IMG_SIZES[size];
  img.style.maxHeight='none';
  img.style.objectFit='contain';
  btn.closest('.vblk').querySelectorAll('.img-size-btn').forEach(b=>{
    b.classList.toggle('on',b.textContent===size);
  });
}

// ═══ Image Copy ═══
async function copyImg(url){
  try{
    const res=await fetch(url);
    const blob=await res.blob();
    const imgBlob=new Blob([blob],{type:'image/png'});
    await navigator.clipboard.write([new ClipboardItem({'image/png':imgBlob})]);
    toast('이미지가 복사됐어요 📋','ok');
  }catch(e){
    // Fallback: open in new tab
    window.open(url,'_blank');
    toast('브라우저 제한으로 새 탭에서 열었어요');
  }
}

// ═══ Comments ═══
function loadComments(recId){
  if(unsubComments)unsubComments();
  // [수정 1] 해당 게시판의 글에서 댓글을 불러오기
  unsubComments=db.collection(currentBoardCollection).doc(recId).collection('comments').orderBy('createdAt','asc').onSnapshot(snap=>{
    const comments=snap.docs.map(d=>({id:d.id,...d.data()}));
    renderComments(comments,recId);
    document.getElementById('cmtCnt').textContent=comments.length;
    // [수정 2] 해당 게시판의 원본 글에 댓글 개수 업데이트하기
    db.collection(currentBoardCollection).doc(recId).update({commentCount:comments.length}).catch(()=>{});
  },err=>console.error(err));
}
  
function renderComments(comments,recId){
  const el=document.getElementById('cmtList');if(!el)return;
  if(!comments.length){el.innerHTML=`<div class="comment-empty">댓글이 없어요. 첫 댓글을 남겨보세요!</div>`;return;}
  el.innerHTML=comments.map(c=>{
    const canDel=currentUser.isMaster||c.authorId===currentUser.uid;
    const initials=c.authorName?c.authorName.slice(0,1).toUpperCase():'?';
    return`<div class="comment-item">
      <div class="comment-header">
        <div class="comment-avatar">${initials}</div>
        <span class="comment-author">${c.authorName||'알 수 없음'}</span>
        <span class="comment-time">${timeAgo(c.createdAt?.toDate?.()?.toISOString()||c.createdAt)}</span>
      </div>
      <div class="comment-text">${c.text}</div>
      ${canDel?`<button class="comment-del" onclick="delComment('${recId}','${c.id}')"><i class="ti ti-trash"></i></button>`:''}
    </div>`;
  }).join('');
}

async function addComment(recId){
  const inp=document.getElementById('cmtInput');
  const text=inp?.value.trim();if(!text)return;
  try{
    // [수정] 현재 게시판에 댓글 달기
    await db.collection(currentBoardCollection).doc(recId).collection('comments').add({text,authorId:currentUser.uid,authorName:currentUser.username,createdAt:firebase.firestore.FieldValue.serverTimestamp()});
    if(inp)inp.value='';
  }catch(e){toast('댓글 등록에 실패했어요','err');}
}

async function delComment(recId,cmtId){
  if(!confirm('댓글을 삭제할까요?'))return;
  try{
    // [수정] 현재 게시판의 댓글 삭제
    await db.collection(currentBoardCollection).doc(recId).collection('comments').doc(cmtId).delete();
  }
  catch(e){toast('삭제에 실패했어요','err');}
}

// ═══ Delete Record ═══
async function doDel(id){
  if(!confirm('이 기록을 삭제할까요?'))return;
  ld(true,'삭제 중...');
  try{
    const rec=records.find(r=>r.id===id);
    if(rec){
      for(const b of(rec.blocks||[])){if(b.type==='image'&&b.path){try{await storage.ref(b.path).delete();}catch(e){}}}
      try{await storage.ref(`thumbs/${id}.jpg`).delete();}catch(e){}
      // [수정] 해당 게시판의 댓글 데이터들 먼저 지우기
      const cmts=await db.collection(currentBoardCollection).doc(id).collection('comments').get();
      for(const c of cmts.docs)await c.ref.delete();
    }
    // [수정] 해당 게시판의 본문 데이터 지우기
    await db.collection(currentBoardCollection).doc(id).delete();
    closeSheet();toast('삭제됐어요');
  }catch(err){toast('삭제에 실패했어요','err');}
  finally{ld(false);}
}

async function approveUser(uid){try{await db.collection('users').doc(uid).update({status:'approved'});renderSettingsSheet();toast('승인됐어요','ok');}catch(e){toast('실패했어요','err');}}
async function removeUser(uid,username){if(!confirm(`'${username}' 계정을 삭제할까요?`))return;try{await db.collection('users').doc(uid).delete();renderSettingsSheet();toast('삭제됐어요');}catch(e){toast('실패했어요','err');}}
async function toggleDelPerm(uid,val){try{await db.collection('users').doc(uid).update({canDelete:val});if(uid===currentUser.uid)currentUser.canDelete=val;}catch(e){toast('변경에 실패했어요','err');}}
async function doChPass(){
  const c=document.getElementById('cp').value,n1=document.getElementById('np1').value,n2=document.getElementById('np2').value;
  const e=document.getElementById('cperr'),o=document.getElementById('cpok');
  e.style.display='none';o.style.display='none';
  if(!c){e.textContent='현재 비밀번호를 입력해주세요';e.style.display='block';return;}
  if(n1.length<6){e.textContent='새 비밀번호는 6자 이상이어야 해요';e.style.display='block';return;}
  if(n1!==n2){e.textContent='비밀번호가 일치하지 않아요';e.style.display='block';return;}
  try{
    const user=auth.currentUser;
    const cred=firebase.auth.EmailAuthProvider.credential(user.email,c);
    await user.reauthenticateWithCredential(cred);
    await user.updatePassword(n1);
    o.textContent='비밀번호가 변경됐어요!';o.style.display='block';
    ['cp','np1','np2'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});
  }catch(err){e.textContent='현재 비밀번호가 올바르지 않아요';e.style.display='block';}
}
function doLogout(){if(unsubRecords){unsubRecords();unsubRecords=null;}if(unsubComments){unsubComments();unsubComments=null;}currentUser=null;records=[];favTags=[];auth.signOut();closeSheet();}

function closeSheet(){document.getElementById('overlay').classList.remove('on');if(unsubComments){unsubComments();unsubComments=null;}}
function bgClick(e){if(e.target===document.getElementById('overlay'))closeSheet();}
/* ========== 게시판 전환 로직 (사이드바 연동 버전) ========== */
var currentBoardCollection = 'records'; 

function setBoard(boardType) {
  currentBoardCollection = boardType;
  
  // 1. 헤더 타이틀 변경
  const ht = document.getElementById('hdrTitle');
  if(ht) ht.textContent = boardType === 'records' ? '수리 일지' : '가이드';
  
  // 2. 사이드바 메뉴 활성화 시각화 (기존 코드의 sb-item 스타일 활용)
  const recTab = document.getElementById('sideTabRecords');
  const guiTab = document.getElementById('sideTabGuides');
  
  if(recTab) recTab.classList.toggle('active', boardType === 'records');
  if(guiTab) guiTab.classList.toggle('active', boardType === 'guides');
  
  // 3. 데이터 새로고침 (기본 데이터 구독 함수 호출)
  if(typeof subscribeRecords === 'function') subscribeRecords(); 
  
  // 4. 메뉴 클릭 후 사이드바 자동으로 닫기
  if(typeof closeSidebar === 'function') closeSidebar();
  
  toast(boardType === 'records' ? '수리 일지로 이동했습니다.' : '가이드로 이동했습니다.');
}
  
/* ========== [추가] 캔버스 그리기(마크업) 로직 ========== */
let baseImg = new Image();
let drawCtx;
let isDrawing = false;
let drawCanvas;

// 페이지가 켜지면 캔버스 이벤트 등록
window.addEventListener('DOMContentLoaded', () => {
  drawCanvas = document.getElementById('drawCanvas');
  if(drawCanvas) {
    drawCanvas.addEventListener('mousedown', startDraw);
    drawCanvas.addEventListener('mousemove', moveDraw);
    drawCanvas.addEventListener('mouseup', endDraw);
    drawCanvas.addEventListener('mouseout', endDraw);
    drawCanvas.addEventListener('touchstart', startDraw, {passive: false});
    drawCanvas.addEventListener('touchmove', moveDraw, {passive: false});
    drawCanvas.addEventListener('touchend', endDraw);
  }
});

function handleFileSelectForDraw(e) {
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = function(evt) {
    baseImg.src = evt.target.result;
    baseImg.onload = function() { openDrawModal(); }
  };
  reader.readAsDataURL(file);
  e.target.value = '';
}

function openDrawModal() {
  document.getElementById('drawOverlay').classList.add('on');
  drawCtx = drawCanvas.getContext('2d');
  const wrap = document.getElementById('drawCanvasWrap');
  const ww = wrap.clientWidth; const wh = wrap.clientHeight; const wr = ww / wh;
  
  // 해상도 조절 (최대 1200px)
  let iw = baseImg.width; let ih = baseImg.height;
  const MAX_RES = 1200;
  if(iw > MAX_RES || ih > MAX_RES) {
    const ir = iw / ih;
    if(iw > ih) { iw = MAX_RES; ih = MAX_RES / ir; } else { ih = MAX_RES; iw = MAX_RES * ir; }
  }
  drawCanvas.width = iw; drawCanvas.height = ih;
  
  // 화면 중앙에 비율 맞춰 정렬
  const ir = iw / ih; let dw, dh;
  if(ir > wr) { dw = ww; dh = ww / ir; } else { dh = wh; dw = wh * ir; }
  drawCanvas.style.width = dw + 'px'; drawCanvas.style.height = dh + 'px';
  drawCanvas.style.left = (ww - dw)/2 + 'px'; drawCanvas.style.top = (wh - dh)/2 + 'px';
  resetDraw();
}

function resetDraw() {
  drawCtx.clearRect(0, 0, drawCanvas.width, drawCanvas.height);
  drawCtx.drawImage(baseImg, 0, 0, drawCanvas.width, drawCanvas.height);
}

function getMousePos(e) {
  const rect = drawCanvas.getBoundingClientRect();
  const clientX = e.clientX || (e.touches && e.touches[0].clientX);
  const clientY = e.clientY || (e.touches && e.touches[0].clientY);
  return {
    x: (clientX - rect.left) * (drawCanvas.width / rect.width),
    y: (clientY - rect.top) * (drawCanvas.height / rect.height)
  };
}

const startDraw = (e) => {
  isDrawing = true; const pos = getMousePos(e);
  drawCtx.beginPath(); drawCtx.moveTo(pos.x, pos.y);
  drawCtx.strokeStyle = '#EF4444'; drawCtx.lineWidth = Math.max(4, drawCanvas.width / 150);
  drawCtx.lineCap = 'round'; drawCtx.lineJoin = 'round';
};

const moveDraw = (e) => {
  if(!isDrawing) return;
  e.preventDefault();
  const pos = getMousePos(e);
  drawCtx.lineTo(pos.x, pos.y); drawCtx.stroke();
};

const endDraw = () => { isDrawing = false; };

// 버튼을 누르면 숨겨진 파일 선택창을 생성해서 띄워주는 함수
function openDrawPicker() {
  let inp = document.createElement('input');
  inp.type = 'file';
  inp.accept = 'image/*';
  inp.onchange = function(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function(ev) {
      aBlks.push({
        type: 'image',
        file: file,
        previewUrl: ev.target.result
      });
      renderBlks();
    };
    reader.readAsDataURL(file);
  };
  inp.click();
}

// Base64 이미지 데이터를 한솔님의 기존 저장 로직과 호환되는 File 객체로 변환하는 함수
function dataURLtoFile(dataurl, filename) {
  let arr = dataurl.split(','), mime = arr[0].match(/:(.*?);/)[1],
      bstr = atob(arr[1]), n = bstr.length, u8arr = new Uint8Array(n);
  while(n--){ u8arr[n] = bstr.charCodeAt(n); }
  return new File([u8arr], filename, {type:mime});
}

// 캔버스에 그린 그림을 aBlks 배열에 넣고 화면을 다시 그리는 함수
function applyDraw() {
  const dataUrl = drawCanvas.toDataURL('image/jpeg', 0.85);
  const drawnFile = dataURLtoFile(dataUrl, 'markup_' + Date.now() + '.jpg');

// 한솔님의 블록 배열 시스템에 정식으로 데이터 삽입
  aBlks.push({
    type: 'image',
    file: drawnFile,
    previewUrl: dataUrl
  });
  
  // 한솔님이 만들어두신 화면 렌더링 함수 재호출
  renderBlks(); 
  document.getElementById('drawOverlay').classList.remove('on');
}
</script>
